name: Go Release

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish-go:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Build release binaries
        run: make release-local VERSION=${{ github.event.release.tag_name || github.ref_name }}

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/SHA256SUMS
